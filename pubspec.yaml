name: attendance_app
description: Attendance Management System
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0

  cupertino_icons: ^1.0.6
  geolocator: ^10.1.0
  geocoding: ^3.0.0
  intl: ^0.19.0
  table_calendar: ^3.1.3
  google_nav_bar: ^5.0.6
  google_maps_flutter: ^2.10.0
  shimmer: ^3.0.0
  confetti: ^0.8.0
  lottie: ^3.3.2
  haptic_feedback: ^0.6.4+3
  csv: ^7.1.0
  path_provider: ^2.1.5
  share_plus: ^10.0.0
  image_picker: ^1.2.1
  firebase_storage: ^11.7.7
  fl_chart: ^0.69.2
  percent_indicator: ^4.2.5
  google_fonts: ^8.0.2
  slide_to_act: ^2.0.2
  animate_do: ^4.2.0
  http: ^1.2.1
  firebase_messaging: ^14.9.4
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  onesignal_flutter: ^5.5.4
  url_launcher: ^6.3.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/

